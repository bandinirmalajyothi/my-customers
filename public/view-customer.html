<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Details - My Customers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-50">
  <!-- Navigation Bar -->
  <nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="text-2xl font-bold text-blue-600">My Customers</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Back Button -->
    <a href="index.html" class="inline-block mb-6 text-blue-600 hover:text-blue-800 font-semibold">← Back to Dashboard</a>

    <!-- Customer Form -->
    <div class="bg-white rounded-lg shadow p-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-8">Customer Details</h1>

      <form id="customerForm" class="space-y-6">
        <!-- Photo Section -->
        <div class="border-b pb-6">
          <label class="block text-lg font-semibold text-gray-900 mb-4">Photo</label>
          <div class="flex gap-6">
            <div class="flex-1">
              <div id="photoPreview" class="w-full bg-gray-300 rounded-lg overflow-hidden flex items-center justify-center" style="min-height: 200px;">
                <span class="text-gray-500">No photo</span>
              </div>
            </div>
            <div class="flex-1 flex flex-col justify-center">
              <input type="file" id="photoInput" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mb-2">
              <button type="button" id="uploadPhotoBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition">
                Upload Photo
              </button>
              <p class="text-sm text-gray-500 mt-2">JPG, PNG up to 5MB</p>
            </div>
          </div>
        </div>

        <!-- Name Field -->
        <div>
          <label for="name" class="block text-sm font-semibold text-gray-900 mb-2">Name</label>
          <input type="text" id="name" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
        </div>

        <!-- Status Dropdown -->
        <div>
          <label for="status" class="block text-sm font-semibold text-gray-900 mb-2">Status</label>
          <select id="status" name="status" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
            <option value="Planning">Planning</option>
            <option value="In-progress">In-progress</option>
            <option value="Review">Review</option>
            <option value="Complete">Complete</option>
          </select>
        </div>

        <!-- Account Balance -->
        <div>
          <label for="balance" class="block text-sm font-semibold text-gray-900 mb-2">Account Balance</label>
          <input type="number" id="balance" name="balance" step="0.01" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
        </div>

        <!-- Invoice Button -->
        <div>
          <label class="block text-sm font-semibold text-gray-900 mb-2">Invoice</label>
          <button type="button" id="invoiceBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition">
            Generate Invoice
          </button>
        </div>

        <!-- Previous Invoices -->
        <div id="invoicesSection" class="hidden">
          <label class="block text-sm font-semibold text-gray-900 mb-2">Previous Invoices</label>
          <div id="invoicesList" class="space-y-2">
            <!-- Invoices will be listed here -->
          </div>
        </div>

        <!-- Notes -->
        <div>
          <label for="notes" class="block text-sm font-semibold text-gray-900 mb-2">Notes</label>
          <textarea id="notes" name="notes" rows="5" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none"></textarea>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4 pt-6 border-t">
          <button type="submit" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-semibold transition">
            Save Customer
          </button>
          <button type="button" id="deleteBtn" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-semibold transition">
            Delete Customer
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Loading Indicator -->
  <div id="loadingIndicator" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white rounded-lg p-8">
      <div class="text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        <p class="mt-4 text-gray-700">Loading customer...</p>
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div id="notification" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg hidden z-50">
    <!-- Message will be inserted here -->
  </div>

  <!-- Confirmation Modal -->
  <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white rounded-lg p-8 max-w-sm">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Confirm Delete</h2>
      <p class="text-gray-700 mb-6">Are you sure you want to delete this customer? This action cannot be undone.</p>
      <div class="flex gap-4">
        <button type="button" id="cancelDeleteBtn" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-lg font-semibold transition">
          Cancel
        </button>
        <button type="button" id="confirmDeleteBtn" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold transition">
          Delete
        </button>
      </div>
    </div>
  </div>

  <!-- Invoice Modal -->
  <div id="invoiceModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 overflow-y-auto">
    <div class="bg-white rounded-lg p-8 max-w-2xl w-full my-8">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">Generate Invoice</h2>
      
      <form id="invoiceForm" class="space-y-6">
        <!-- Date -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="invoiceDate" class="block text-sm font-semibold text-gray-900 mb-2">Date</label>
            <input type="date" id="invoiceDate" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
          </div>
          <div>
            <label for="invoiceNumber" class="block text-sm font-semibold text-gray-900 mb-2">Invoice #</label>
            <input type="text" id="invoiceNumber" placeholder="e.g., INV-001" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
          </div>
        </div>

        <!-- Business and Client Names -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="businessName" class="block text-sm font-semibold text-gray-900 mb-2">Your Business Name</label>
            <input type="text" id="businessName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
          </div>
          <div>
            <label for="clientName" class="block text-sm font-semibold text-gray-900 mb-2">Client Name</label>
            <input type="text" id="clientName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
          </div>
        </div>

        <!-- Line Items -->
        <div>
          <div class="flex justify-between items-center mb-3">
            <label class="block text-sm font-semibold text-gray-900">Line Items</label>
            <button type="button" id="addLineItemBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-sm font-semibold transition">
              + Add Item
            </button>
          </div>
          
          <div id="lineItemsContainer" class="space-y-3 max-h-64 overflow-y-auto border border-gray-300 rounded-lg p-3">
            <!-- Line items will be added here -->
          </div>
        </div>

        <!-- Grand Total -->
        <div class="bg-gray-100 p-4 rounded-lg">
          <div class="flex justify-between items-center">
            <span class="text-lg font-bold text-gray-900">Grand Total:</span>
            <span class="text-2xl font-bold text-blue-600">$<span id="grandTotal">0.00</span></span>
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4 pt-6 border-t">
          <button type="button" id="closeInvoiceModalBtn" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-3 rounded-lg font-semibold transition">
            Cancel
          </button>
          <button type="submit" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-semibold transition">
            Generate PDF & Save
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="view-customer.js"></script>
</body>
</html>
